services:
  - type: web
    name: invitecraft-backend
    runtime: python
    rootDir: backend
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn server:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: MONGO_URL
        sync: false
      - key: DB_NAME
        value: invitecraft
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGINS
        value: https://tejasweeviswanadham.github.io
      - key: APP_PUBLIC_BASE
        value: https://tejasweeviswanadham.github.io/InviteGenerator
      - key: RESEND_API_KEY
        sync: false
      - key: SENDER_EMAIL
        value: onboarding@resend.dev
      - key: APP_NAME
        value: invitecraft
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
